name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What's the idea?
      description: What would you like to see, and what problem does it solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false
  - type: checkboxes
    id: doctrine
    attributes:
      label: Fits the app's privacy doctrine
      options:
        - label: This works without accounts, servers, tracking, or persisting message content.
          required: false

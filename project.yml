# XcodeGen project definition.
# Generate the Xcode project with:  bash scripts/generate.sh
# (install xcodegen via `brew install xcodegen`; Ruby ships with macOS for the
# local merge step). Set DEVELOPMENT_TEAM in
# project.local.yml (copy from project.local.yml.example). Register the App Group
# for your team when first signing on device — automatic signing handles this if
# the entitlements below match SharedConfigStore.appGroupID.

name: StopPoliticalSpamTexts
options:
  bundleIdPrefix: com.lukewalton
  projectFormat: xcode15_0
  deploymentTarget:
    iOS: "16.1"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic

# Local Swift Package: the LFW design system that gives the app its
# onboarding/chrome vocabulary. Vendored into this repo (a copy of the package
# shared across the original monorepo); path is relative to this project.yml.
packages:
  LFWDesignSystem:
    path: lfwdesignsystem

targets:
  StopPoliticalSpamTexts:
    type: application
    platform: iOS
    sources:
      - path: StopPoliticalSpamTexts/App
      - path: StopPoliticalSpamTexts/Classifier
      - path: StopPoliticalSpamTexts/Storage
      - path: StopPoliticalSpamTexts/Resources/Assets.xcassets
    entitlements:
      path: StopPoliticalSpamTexts/App/StopPoliticalSpamTexts.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lukewalton.stoppoliticalspamtexts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukewalton.stoppoliticalspamtexts
        INFOPLIST_FILE: StopPoliticalSpamTexts/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: StopPoliticalSpamTextsMessageFilter
        embed: true
      - package: LFWDesignSystem

  StopPoliticalSpamTextsMessageFilter:
    type: app-extension
    platform: iOS
    sources:
      - path: StopPoliticalSpamTextsMessageFilter
      - path: StopPoliticalSpamTexts/Classifier
      - path: StopPoliticalSpamTexts/Storage
    entitlements:
      path: StopPoliticalSpamTextsMessageFilter/StopPoliticalSpamTextsMessageFilter.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lukewalton.stoppoliticalspamtexts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukewalton.stoppoliticalspamtexts.messagefilter
        INFOPLIST_FILE: StopPoliticalSpamTextsMessageFilter/Info.plist
        GENERATE_INFOPLIST_FILE: NO

  StopPoliticalSpamTextsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StopPoliticalSpamTextsTests
    dependencies:
      - target: StopPoliticalSpamTexts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukewalton.stoppoliticalspamtexts.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  StopPoliticalSpamTexts:
    build:
      targets:
        StopPoliticalSpamTexts: all
    test:
      targets:
        - StopPoliticalSpamTextsTests
    run:
      config: Debug
